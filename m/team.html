<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta name="theme-color" content="#006b32"/>
<title>专家团队 · 浙江张旭动物医院</title>
<script>
(function(){try{var ua=navigator.userAgent||"";var preview=/[?&]preview=1/.test(location.search);var isMobile=window.matchMedia("(max-width: 820px)").matches||/Android|iPhone|iPod|Windows Phone|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);if(!isMobile&&!preview){var f=(location.pathname.split("/").pop()||"index.html");window.location.replace("../"+f+location.search);}}catch(e){}})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/shell.js"></script>
<link rel="stylesheet" href="assets/mobile.css"/>
</head>
<body class="font-body antialiased" data-page="team">
<main>
  <!-- Hero -->
  <section class="px-5 pt-8">
    <p class="font-display text-[11px] font-bold tracking-[0.18em] text-secondary uppercase mb-3">Our Specialists</p>
    <h1 class="font-display font-extrabold tracking-tight text-[2rem] leading-[1.16]">专家团队</h1>
    <p class="mt-4 text-[14.5px] leading-[1.75] text-on-surface-variant">
      国家执业兽医，覆盖外科、内科、影像、麻醉、异宠等多个专科，三大院区协同会诊。
    </p>
  </section>

  <!-- 院区筛选 -->
  <section class="mt-6">
    <div class="rail" id="campusFilter" aria-label="按院区筛选">
      <button data-campus="all" class="h-9 px-4 rounded-full bg-primary text-on-primary font-display font-bold text-[13px] whitespace-nowrap">全部</button>
      <button data-campus="binjiang" class="h-9 px-4 rounded-full bg-surface-low text-on-surface font-display font-bold text-[13px] whitespace-nowrap">滨江院区</button>
      <button data-campus="chaohui" class="h-9 px-4 rounded-full bg-surface-low text-on-surface font-display font-bold text-[13px] whitespace-nowrap">朝晖院区</button>
      <button data-campus="chengxi" class="h-9 px-4 rounded-full bg-surface-low text-on-surface font-display font-bold text-[13px] whitespace-nowrap">城西院区</button>
    </div>
  </section>

  <!-- 医生网格 -->
  <section class="px-5 mt-4">
    <div id="docGrid" class="grid grid-cols-2 gap-3"></div>
    <p id="docEmpty" class="hidden text-center text-on-surface-variant text-[14px] py-12">该院区暂无医生信息</p>
  </section>
</main>

<script src="../assets/js/doctors-data.js"></script>
<script>
(function () {
  var list = window.DOCTOR_PROFILES || [];
  var grid = document.getElementById("docGrid");

  function card(d) {
    var href = d.slug === "zhang-xu" ? "doctor-zhangxu.html" : "doctor-profile.html?doctor=" + d.slug;
    var campuses = (d.campuses || []).join(" ");
    return '<a href="' + href + '" data-campus="' + campuses + '" class="rounded-xl3 bg-surface-low overflow-hidden active:bg-surface-c transition-colors">' +
      '<div class="h-40 bg-surface-high overflow-hidden"><img src="../' + d.portrait + '" alt="' + d.name + '" class="w-full h-full object-cover"/></div>' +
      '<div class="p-3.5">' +
        '<div class="text-[10px] font-display font-bold tracking-wider text-secondary uppercase">' + (d.label || "") + '</div>' +
        '<div class="font-display font-extrabold text-[15px] mt-1">' + d.name + '<span class="text-[10.5px] font-medium text-on-surface-variant ml-1">' + (d.role || "") + '</span></div>' +
        '<div class="text-[11px] text-on-surface-variant mt-1.5 clamp2 leading-relaxed">' + (d.specialty || "") + '</div>' +
        '<div class="text-[10.5px] text-secondary mt-2 flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:13px">location_on</span>' + (d.campus || "") + '</div>' +
      '</div></a>';
  }

  if (grid) grid.innerHTML = list.map(card).join("");

  var empty = document.getElementById("docEmpty");
  var btns = document.querySelectorAll("#campusFilter button");
  var ON = "bg-primary text-on-primary", OFF = "bg-surface-low text-on-surface";
  btns.forEach(function (btn) {
    btn.addEventListener("click", function () {
      btns.forEach(function (b) {
        b.classList.remove("bg-primary", "text-on-primary", "bg-surface-low", "text-on-surface");
        (b === btn ? ON : OFF).split(" ").forEach(function (cls) { b.classList.add(cls); });
      });
      var c = btn.getAttribute("data-campus");
      var shown = 0;
      grid.querySelectorAll("a").forEach(function (a) {
        var match = c === "all" || (a.getAttribute("data-campus") || "").indexOf(c) !== -1;
        a.style.display = match ? "" : "none";
        if (match) shown++;
      });
      empty.classList.toggle("hidden", shown > 0);
    });
  });
})();
</script>
</body>
</html>
