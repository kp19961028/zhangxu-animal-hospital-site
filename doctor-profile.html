<script src="assets/js/doctors-data.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const key = params.get("doctor") || "zhang-xu";
const profile = (window.DOCTOR_MAP && window.DOCTOR_MAP[key]) || (window.DOCTOR_MAP && window.DOCTOR_MAP["zhang-xu"]);

if (profile) {
  document.title = `${profile.name} - ${document.title}`;
  document.getElementById("doctor-name").textContent = profile.name;
  document.getElementById("doctor-role").textContent = profile.role;
  document.getElementById("doctor-campus").textContent = profile.campus;
  document.getElementById("doctor-specialty").textContent = profile.specialty;
  document.getElementById("doctor-summary").textContent = profile.summary;
  const portrait = document.getElementById("portrait");
  if (profile.portrait) {
    portrait.src = profile.portrait;
    portrait.alt = profile.name;
  } else {
    portrait.parentElement.innerHTML = `<div class="w-full h-full min-h-[420px] bg-surface-container-high flex flex-col items-center justify-center px-8 text-center">
      <span class="text-6xl font-black text-primary mb-4">${profile.name.slice(0, 1)}</span>
      <span class="text-3xl font-extrabold text-on-surface mb-3">${profile.name}</span>
      <span class="text-sm font-bold text-on-surface-variant">${profile.role}</span>
    </div>`;
  }
  document.getElementById("resume-image").src = profile.resume;
  document.getElementById("resume-image").alt = profile.name;
  document.getElementById("resume-link").href = profile.resume;

  const badges = document.getElementById("badges");
  badges.innerHTML = profile.badges.map((badge) => `<span class="bg-secondary-container text-on-secondary-container text-xs font-bold px-3 py-1 rounded">${badge}</span>`).join("");

  function renderList(id, items) {
    document.getElementById(id).innerHTML = items.map((item) => `<li class="flex gap-3"><span class="mt-2 h-1.5 w-1.5 rounded-full bg-primary shrink-0"></span><span>${item}</span></li>`).join("");
  }

  renderList("experience-list", profile.experience || []);
  renderList("focus-list", profile.focus || []);
}
</script>
